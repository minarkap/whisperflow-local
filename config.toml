[hotkey]
# Combinación de teclas para push-to-talk (mantener pulsado para grabar)
# Teclas modificadoras válidas: ctrl, alt, shift, cmd
# Tecla principal: cualquier tecla o "space", "tab", etc.
modifiers = []
key = "alt_r"

[audio]
# Frecuencia de muestreo requerida por Whisper
sample_rate = 16000
# Canales (1 = mono)
channels = 1
# Dispositivo de entrada (-1 = micrófono por defecto del sistema)
device = -1

[model]
engine = "whisper"
whisper_repo = "mlx-community/whisper-large-v3-turbo-q4"
# Idioma ("es" = español forzado, "" = autodetección)
# "es" = fuerza español (puede manchar siglas inglesas)
# ""   = autodetect por segmento (mejor para mezcla español+inglés técnico)
language = ""

[feedback]
start_sound = true
stop_sound = true
# Detectar listas con ordinales (primero, segundo...) y formatear con guiones
format_lists = true
