[hotkey]
# Combinación de teclas para push-to-talk (mantener pulsado para grabar)
# Teclas modificadoras válidas: ctrl, alt, shift, cmd
# Tecla principal: cualquier tecla o "space", "tab", etc.
modifiers = []
key = "alt_r"

[audio]
# Frecuencia de muestreo requerida por Voxtral/Whisper
sample_rate = 16000
# Canales (1 = mono)
channels = 1
# Dispositivo de entrada (-1 = micrófono por defecto del sistema)
device = -1

[model]
# Opciones: "qwen3-asr" | "voxtral-mini-3b" | "whisper"
engine = "qwen3-asr"
qwen3_repo   = "Qwen/Qwen3-ASR-0.6B"
voxtral_repo = "mzbac/voxtral-mini-3b-4bit-mixed"
whisper_repo = "mlx-community/whisper-large-v3-turbo"
# Idioma ("es" = español forzado, "" = autodetección)
# "es" = fuerza español (puede manchar siglas inglesas)
# ""   = autodetect por segmento (mejor para mezcla español+inglés técnico)
language = ""

[limits]
# Segundos máximos de grabación antes de cortar automáticamente
max_record_secs = 180

[feedback]
# Sonido al empezar a grabar
start_sound = true
# Sonido al terminar de grabar (antes de transcribir)
stop_sound = true
